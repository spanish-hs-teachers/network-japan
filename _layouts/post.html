---
layout: default
---
<section class="page-hero">
  <div class="container">
    <p class="eyebrow">お知らせ</p>
    <h1>{{ page.title }}</h1>
    <p class="meta">公開日: <time datetime="{{ page.publishDate | default: page.date | date_to_xmlschema }}">{{ page.publishDate | default: page.date | date: '%Y年%-m月%-d日' }}</time></p>
  </div>
</section>

<article class="page-body">
  <div class="container prose">
    {{ content }}
    <p><a href="{{ '/news/' | relative_url }}">お知らせ一覧へ戻る</a></p>
  </div>
</article>
